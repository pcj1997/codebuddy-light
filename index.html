<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Traffic Light</title>
  </head>
  <body data-state="idle">
    <main class="widget">
      <section class="housing" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>AI</div>
        <div
          class="light light-red"
          data-state="waiting"
          data-tauri-drag-region
        ></div>
        <div
          class="light light-yellow"
          data-state="working"
          data-tauri-drag-region
        ></div>
        <div
          class="light light-green"
          data-state="completed"
          data-tauri-drag-region
        ></div>
      </section>

      <div class="panel-stack">
        <section class="panel">
          <strong id="status-label">空闲</strong>
          <span id="session-count">暂无会话记录</span>
          <ul id="session-list" class="session-list"></ul>
          <button id="clear-sessions" class="clear-sessions" type="button" hidden>
            清除会话记录
          </button>
        </section>
        <section id="hooks-warning" class="panel hooks-warning" hidden>
          <span id="hooks-warning-message">Hooks 缺失或需要更新</span>
          <span id="hooks-status" class="hooks-status" role="status" hidden></span>
          <button id="setup-hooks" type="button">安装 Hooks</button>
        </section>
        <section id="remote-bridge" class="panel remote-bridge">
          <strong>SSH 桥接</strong>
          <span id="remote-bridge-summary">正在启动…</span>
          <code id="remote-bridge-command"></code>
          <span id="remote-bridge-status" class="hooks-status" role="status" hidden></span>
          <button id="prepare-remote-bridge" type="button">生成远端脚本</button>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
