name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Test Python Hook
        if: runner.os == 'macOS'
        run: |
          printf '{"session_id":"ci-test"}' | python3 hooks/status_writer.py --state working --message test
          test -f "$HOME/.ai-traffic-light/sessions/codebuddy-ci-test.json"
          created_at="$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path.home().joinpath(".ai-traffic-light/sessions/codebuddy-ci-test.json").read_text())["created_at"])')"
          printf '{"session_id":"ci-test"}' | python3 hooks/status_writer.py --state completed --message done
          test "$created_at" = "$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path.home().joinpath(".ai-traffic-light/sessions/codebuddy-ci-test.json").read_text())["created_at"])')"
          printf '{"session_id":"ci-test"}' | python3 hooks/status_writer.py --state idle
          test ! -f "$HOME/.ai-traffic-light/sessions/codebuddy-ci-test.json"
          printf '{"session_id":"ci-claude","hook_event_name":"PermissionRequest"}' |
            python3 hooks/status_writer.py --client claude --state working --message test
          test "$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path.home().joinpath(".ai-traffic-light/sessions/claude-ci-claude.json").read_text())["state"])')" = "waiting"
          printf '{"session_id":"ci-claude-elicit","hook_event_name":"Elicitation"}' |
            python3 hooks/status_writer.py --client claude --state working --message test
          test "$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path.home().joinpath(".ai-traffic-light/sessions/claude-ci-claude-elicit.json").read_text())["message"])')" = "等待补充信息"
          printf '{"session_id":"ci-claude-denied","hook_event_name":"PermissionDenied"}' |
            python3 hooks/status_writer.py --client claude --state working --message test
          test "$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path.home().joinpath(".ai-traffic-light/sessions/claude-ci-claude-denied.json").read_text())["state"])')" = "error"
          output="$(printf '{"session_id":"ci-codex","hook_event_name":"Stop"}' |
            python3 hooks/status_writer.py --client codex --state completed --message done --emit-empty-json)"
          test "$output" = "{}"
          test -f "$HOME/.ai-traffic-light/sessions/codex-ci-codex.json"
          bridge_body="$RUNNER_TEMP/ai-traffic-light-bridge-body.json"
          python3 - <<'PY' "$bridge_body" &
          import http.server
          import pathlib
          import sys
          out = pathlib.Path(sys.argv[1])
          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  out.write_bytes(self.rfile.read(int(self.headers.get("content-length", "0"))))
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b'{"ok":true}')
              def log_message(self, *args):
                  pass
          http.server.HTTPServer(("127.0.0.1", 38628), Handler).handle_request()
          PY
          bridge_pid=$!
          sleep 0.2
          printf '{"session_id":"ci-remote","cwd":"/srv/中文项目"}' |
            python3 hooks/status_writer.py --client codebuddy --state working --message test --bridge-url http://127.0.0.1:38628/hook/test
          wait "$bridge_pid"
          python3 - <<'PY' "$bridge_body"
          import json
          import pathlib
          import sys
          body = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          assert body["client"] == "codebuddy", body
          assert body["session_id"] == "ci-remote", body
          assert body["state"] == "working", body
          assert body["cwd"] == "/srv/中文项目", body
          PY

      - name: Test PowerShell Hook
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          '{"session_id":"ci-test"}' | powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -State working -Message test
          if (-not (Test-Path "$HOME/.ai-traffic-light/sessions/codebuddy-ci-test.json")) { exit 1 }
          $createdAt = (Get-Content "$HOME/.ai-traffic-light/sessions/codebuddy-ci-test.json" -Raw | ConvertFrom-Json).created_at
          '{"session_id":"ci-test"}' | powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -State completed -Message done
          if ((Get-Content "$HOME/.ai-traffic-light/sessions/codebuddy-ci-test.json" -Raw | ConvertFrom-Json).created_at -ne $createdAt) { exit 1 }
          '{"session_id":"ci-test"}' | powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -State idle
          if (Test-Path "$HOME/.ai-traffic-light/sessions/codebuddy-ci-test.json") { exit 1 }
          '{"session_id":"ci-permission","hook_event_name":"PreToolUse","tool_name":"Bash","tool_input":{"requires_approval":true}}' |
            powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -State working -Message test
          $permission = Get-Content "$HOME/.ai-traffic-light/sessions/codebuddy-ci-permission.json" -Raw | ConvertFrom-Json
          if ($permission.state -ne "waiting" -or $permission.message -ne "等待权限确认") { exit 1 }
          '{"session_id":"ci-claude","hook_event_name":"PermissionRequest"}' |
            powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -Client claude -State working -Message test
          $claudePermission = Get-Content "$HOME/.ai-traffic-light/sessions/claude-ci-claude.json" -Raw | ConvertFrom-Json
          if ($claudePermission.state -ne "waiting" -or $claudePermission.client -ne "claude") { exit 1 }
          '{"session_id":"ci-claude-elicit","hook_event_name":"Elicitation"}' |
            powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -Client claude -State working -Message test
          $claudeElicitation = Get-Content "$HOME/.ai-traffic-light/sessions/claude-ci-claude-elicit.json" -Raw | ConvertFrom-Json
          if ($claudeElicitation.state -ne "waiting" -or $claudeElicitation.message -ne "等待补充信息") { exit 1 }
          '{"session_id":"ci-claude-denied","hook_event_name":"PermissionDenied"}' |
            powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -Client claude -State working -Message test
          $claudeDenied = Get-Content "$HOME/.ai-traffic-light/sessions/claude-ci-claude-denied.json" -Raw | ConvertFrom-Json
          if ($claudeDenied.state -ne "error" -or $claudeDenied.message -ne "权限被拒绝") { exit 1 }
          $codexStopOutput = '{"session_id":"ci-codex","hook_event_name":"Stop"}' |
            powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -Client codex -State completed -Message done -EmitEmptyJson
          if ($codexStopOutput -ne "{}") { exit 1 }
          $transcript = Join-Path $env:RUNNER_TEMP "ai-traffic-light-options.jsonl"
          '{"type":"assistant","message":{"role":"assistant","content":[{"type":"text","text":"请选择一种方案：\n1. 方案 A\n2. 方案 B"}]}}' |
            Set-Content -Path $transcript -Encoding utf8
          @{session_id="ci-choice"; hook_event_name="Stop"; transcript_path=$transcript} | ConvertTo-Json -Compress |
            powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -State completed -Message done
          $choice = Get-Content "$HOME/.ai-traffic-light/sessions/codebuddy-ci-choice.json" -Raw | ConvertFrom-Json
          if ($choice.state -ne "waiting" -or $choice.message -ne "等待选择或确认") { exit 1 }
          $chineseCwd = Join-Path $HOME "代码\中文项目"
          @{session_id="ci-chinese"; cwd=$chineseCwd} | ConvertTo-Json -Compress |
            powershell -NoProfile -ExecutionPolicy Bypass -File hooks/status_writer.ps1 -State completed -Message done
          $chineseSession = Get-Content "$HOME/.ai-traffic-light/sessions/codebuddy-ci-chinese.json" -Raw | ConvertFrom-Json
          if ($chineseSession.cwd -ne $chineseCwd) {
            Write-Error "Chinese cwd was not preserved. Expected '$chineseCwd' got '$($chineseSession.cwd)'"
            exit 1
          }
